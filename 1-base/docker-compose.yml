version: "3.9"
name: vote-app-base
services:
  redis:
    image: redis:6.2
    container_name: redis-base
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - 6379:6379

  rabbitmq:
    image: rabbitmq:3.9-management
    container_name: rabbitmq-base
    ports:
      - 5672:5672
      - 15672:15672

  vote-ui:
    image: vote-ui-base
    container_name: vote-ui-base
    depends_on:
      - vote-data
      - vote-processor
      - redis
      - rabbitmq
    build:
      context: .
      dockerfile: vote-ui/Dockerfile
    environment:
      Queue__Host: rabbitmq
      Hosts__VoteDataService: vote-data
    ports:
      - 8080:8080

  vote-data:
    image: vote-data
    container_name: vote-data-base
    depends_on:
        - redis
    build:
        context: .
        dockerfile: vote-data/Dockerfile
    environment:
        Hosts__Redis: redis
    ports:
        - 8081:8081

  vote-processor:
    image: vote-processor
    container_name: vote-processor-base
    depends_on:
        - redis
        - rabbitmq
    build:
        context: .
        dockerfile: vote-processor/Dockerfile
    environment:
        Hosts__Redis: redis
        Queue__Host: rabbitmq
